<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chicken Road 2</title>
  <link rel="stylesheet" href="../../css/styles-chicken.css">
</head>
<body>
  <div class="background">
    <div class="container">
      
      <!-- Логотип -->
      <div class="top-content">
        <img src="../../img/chicken-img/logo.png" alt="logo" class="logo-game">
      </div>

      <!-- Центральное яйцо -->
      <div class="egg-wrapper">
        <div class="print-signal" id="print-signal">
          <span>READY?</span>
        </div>
      </div>

      <!-- Кнопки управления -->
      <div class="button-group">
        <button class="get-signal btn-main" id="get-signal">GET SIGNAL</button>
        <button class="get-signal-two btn-main deactivate" id="get-signal-two">NEXT SIGNAL</button>
        <a href="../../index.html" class="back-link">
          <button class="btn-back">BACK TO FARM</button>
        </a>
      </div>

    </div>
    <!-- Анимированный персонаж -->
    <!-- <img class="pers-animate" src="../../img/chicken-img/chicken.png" alt="chicken"> -->
  </div>

  <script src="../../scripts/script-chicken.js"></script>
</body>
</html>
